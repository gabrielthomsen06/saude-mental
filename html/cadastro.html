<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Saúde Mental e Bem-Estar</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <nav class="navbar">
    <a href="../index.html">Home</a>
    <a href="conteudo.html">Conteúdo educativo</a>
    <a href="humor.html">Medidor de humor</a>
    <a href="ajuda.html">Canais de ajuda</a>
    <a href="cadastro.html">Cadastro</a>
  </nav>

  <main>
    <section>
      <h1>Criar conta</h1>
      <p>Preencha seus dados. Este cadastro é apenas para fins acadêmicos.</p>
    </section>

    <section>
      <form id="formCadastro" class="card">
        <label for="nome"><strong>Nome</strong></label><br>
        <input class="input" type="text" id="nome" name="nome" placeholder="Seu nome" required>
        <p class="msg" id="msgNome"></p>

        <label for="email"><strong>E-mail</strong></label><br>
        <input class="input" type="email" id="email" name="email" placeholder="ex: gabriel@email.com" required>
        <p class="msg" id="msgEmail"></p>

        <label for="senha"><strong>Senha</strong></label><br>
        <input class="input" type="password" id="senha" name="senha" placeholder="Mínimo 8 caracteres" required>
        <p class="msg" id="msgSenha"></p>

        <label for="confirmar"><strong>Confirmar senha</strong></label><br>
        <input class="input" type="password" id="confirmar" name="confirmar" placeholder="Repita a senha" required>
        <p class="msg" id="msgConfirmar"></p>

        <label class="check">
          <input type="checkbox" id="termos" required>
          Li e entendi que este site é educativo e não substitui atendimento profissional.
        </label>
        <p class="msg" id="msgTermos"></p>

        <button class="btn-simples" type="submit">Cadastrar</button>

        <p class="msg" id="msgGeral"></p>
        <p class="muted">
          Já tem conta? <a href="login.html">Ir para login</a>.
        </p>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Saúde Mental e Bem-Estar. Todos os direitos reservados.</p>
  </footer>

  <script src="../js/cadastro.js"></script>
</body>
</html>
